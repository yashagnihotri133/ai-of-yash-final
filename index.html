<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI OF YASH</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{

  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  overflow:hidden;

  background:
  linear-gradient(
  rgba(0,0,20,0.78),
  rgba(0,0,40,0.88)
  ),
  url("bg.jpg");

  background-size:cover;
  background-position:center;

  animation:bgZoom 20s infinite alternate;
}

@keyframes bgZoom{

  from{
    background-size:100%;
  }

  to{
    background-size:115%;
  }

}

/* Floating particles */

.particles span{

  position:absolute;

  width:4px;
  height:4px;

  background:cyan;

  border-radius:50%;

  box-shadow:0 0 10px cyan;

  animation:float 15s linear infinite;
}

@keyframes float{

  from{
    transform:translateY(100vh) scale(0);
    opacity:0;
  }

  20%{
    opacity:1;
  }

  to{
    transform:translateY(-10vh) scale(1.5);
    opacity:0;
  }

}

.chat-box{

  width:430px;
  height:680px;

  position:relative;
  z-index:10;

  background:
  linear-gradient(
  rgba(0,20,40,0.72),
  rgba(5,5,25,0.88)
  );

  border:1px solid rgba(0,255,255,0.25);

  backdrop-filter:blur(18px);

  border-radius:28px;

  padding:18px;

  display:flex;
  flex-direction:column;

  box-shadow:
  0 0 20px #00ffff,
  0 0 40px #00ffff,
  0 0 70px #0088ff,
  0 0 100px #8a2be2;

  animation:glow 3s infinite alternate;
}

@keyframes glow{

  from{

    box-shadow:
    0 0 15px #00ffff,
    0 0 30px #0088ff,
    0 0 50px #8a2be2;
  }

  to{

    box-shadow:
    0 0 30px #00ffff,
    0 0 60px #0088ff,
    0 0 100px #8a2be2;
  }

}

h1{

  text-align:center;

  color:white;

  margin-bottom:8px;

  font-size:34px;

  letter-spacing:3px;

  text-shadow:
  0 0 5px #00ffff,
  0 0 15px #00ffff,
  0 0 30px #0088ff,
  0 0 60px #8a2be2;
}

.subtitle{

  text-align:center;

  color:#bbbbbb;

  margin-bottom:12px;

  font-size:14px;
}

.messages{

  flex:1;

  overflow-y:auto;

  padding:8px;

  scrollbar-width:none;
}

.msg{

  margin:14px 0;

  padding:14px;

  border-radius:18px;

  max-width:82%;

  word-wrap:break-word;

  font-size:15px;

  font-weight:500;

  line-height:1.8;
}

.user{

  background:#00bfff;

  color:white;

  margin-left:auto;

  box-shadow:
  0 0 10px #00bfff,
  0 0 20px #00bfff;
}

.bot{

  background:#7b2cff;

  color:white;

  box-shadow:
  0 0 10px #8a2be2,
  0 0 20px #8a2be2;
}

/* Bold Headings */

.bot h2{

  font-size:26px;

  font-weight:900;

  margin:18px 0 10px;

  color:#ffffff;

  text-shadow:
  0 0 10px #00ffff;
}

.bot h3{

  font-size:21px;

  font-weight:800;

  margin:16px 0 8px;

  color:#eeeeee;
}

.suggestions{

  display:flex;

  gap:8px;

  flex-wrap:wrap;

  margin-bottom:10px;
}

.suggestions button{

  background:rgba(255,255,255,0.08);

  border:1px solid rgba(0,255,255,0.25);

  color:white;

  padding:10px;

  border-radius:12px;

  cursor:pointer;

  transition:0.3s;

  font-size:13px;
}

.suggestions button:hover{

  transform:scale(1.05);

  box-shadow:
  0 0 10px cyan,
  0 0 20px #0088ff;
}

.input-area{

  display:flex;

  gap:10px;

  margin-top:10px;
}

input{

  flex:1;

  padding:14px;

  border:none;

  border-radius:14px;

  outline:none;

  font-size:15px;

  color:white;

  background:rgba(255,255,255,0.08);

  box-shadow:
  0 0 10px rgba(0,255,255,0.45);
}

input::placeholder{
  color:#cccccc;
}

button{

  padding:14px 18px;

  border:none;

  border-radius:14px;

  background:#00bfff;

  color:white;

  font-size:15px;

  cursor:pointer;

  transition:0.3s;

  box-shadow:
  0 0 10px #00bfff,
  0 0 20px #00bfff;
}

button:hover{

  transform:scale(1.08);

  background:#0099cc;

  box-shadow:
  0 0 20px #00ffff,
  0 0 40px #0088ff;
}

</style>

</head>

<body>

<div class="particles">

<span style="left:10%; animation-delay:0s;"></span>
<span style="left:20%; animation-delay:2s;"></span>
<span style="left:35%; animation-delay:4s;"></span>
<span style="left:50%; animation-delay:1s;"></span>
<span style="left:65%; animation-delay:6s;"></span>
<span style="left:80%; animation-delay:3s;"></span>
<span style="left:90%; animation-delay:5s;"></span>

</div>

<div class="chat-box">

<h1>⚡ AI OF YASH</h1>

<div class="subtitle">
Created by Yash Agnihotri
</div>

<div class="messages" id="messages"></div>

<div class="suggestions">

<button onclick="quickAsk('What is artificial intelligence?')">
🤖 What is AI?
</button>

<button onclick="quickAsk('Teach me coding step by step')">
💻 Coding
</button>

<button onclick="quickAsk('How to become successful?')">
🚀 Success
</button>

<button onclick="quickAsk('Tell me a futuristic story')">
🌌 Future
</button>

</div>

<div class="input-area">

<input
id="msg"
placeholder="Ask anything..."
/>

<button onclick="startVoice()">🎤</button>

<button onclick="send()">
Send
</button>

</div>

</div>

<script>

function quickAsk(text){

  document.getElementById("msg").value=text;

  send();
}

function startVoice(){

  const recognition =
  new webkitSpeechRecognition();

  recognition.lang="en-US";

  recognition.start();

  recognition.onresult=function(event){

    const voiceText =
    event.results[0][0].transcript;

    document.getElementById("msg").value =
    voiceText;

    send();
  }
}

function formatReply(text){

  return text

  // Main Heading

  .replace(/^## (.*$)/gim,
  '<h2>$1</h2>')

  // Sub Heading

  .replace(/^### (.*$)/gim,
  '<h3>$1</h3>')

  // Bold text

  .replace(/\*\*(.*?)\*\*/g,
  '<b>$1</b>')

  // Every bullet point in new line

  .replace(/✅/g,'<br><br>✅')

  // Related topics

  .replace(/🌟/g,'<br><br>🌟')

  // Tips

  .replace(/💡/g,'<br><br>💡')

  // New lines

  .replace(/\n/g,'<br>');
}

async function send(){

  const msgInput =
  document.getElementById("msg");

  const message =
  msgInput.value;

  if(!message) return;

  const messagesDiv =
  document.getElementById("messages");

  // User message

  messagesDiv.innerHTML +=
  `<div class="msg user">${message}</div>`;

  msgInput.value="";

  // Loading

  const loading =
  document.createElement("div");

  loading.className="msg bot";

  loading.innerHTML =
  "⚡ AI OF YASH is thinking...";

  messagesDiv.appendChild(loading);

  messagesDiv.scrollTop =
  messagesDiv.scrollHeight;

  // API request

  const res =
  await fetch(`/chat?msg=${message}`);

  const data =
  await res.json();

  loading.remove();

  // Bot message

  const botDiv =
  document.createElement("div");

  botDiv.className="msg bot";

  botDiv.innerHTML =
  formatReply(data.reply);

  messagesDiv.appendChild(botDiv);

  messagesDiv.scrollTop =
  messagesDiv.scrollHeight;
}

</script>

</body>

</html>
